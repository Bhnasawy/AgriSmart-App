services:
  - type: web
    name: agrismart-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrismart-db
          property: connectionString

databases:
  - name: agrismart-db
    plan: free
