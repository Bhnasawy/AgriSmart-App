{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="auth-card">
          <!-- Logo & Title -->
          <div class="text-center mb-4">
            <div class="auth-logo">🌱</div>
            <h2 class="fw-800 text-success">Create Account</h2>
            <p class="text-muted">Join thousands of farmers on Agri Smart</p>
          </div>

          <form action="{{ url_for('main.register') }}" method="POST" novalidate>
            <div class="mb-3">
              <label for="username" class="form-label fw-600">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-person text-success"></i>
                </span>
                <input type="text" class="form-control border-start-0" id="username" name="username"
                       placeholder="Choose a username" required autocomplete="username" />
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-600">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-envelope text-success"></i>
                </span>
                <input type="email" class="form-control border-start-0" id="email" name="email"
                       placeholder="your@email.com" required autocomplete="email" />
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-600">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-lock text-success"></i>
                </span>
                <input type="password" class="form-control border-start-0" id="password" name="password"
                       placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6" />
              </div>
            </div>

            <div class="mb-4">
              <label for="confirm_password" class="form-label fw-600">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-lock-fill text-success"></i>
                </span>
                <input type="password" class="form-control border-start-0" id="confirm_password"
                       name="confirm_password" placeholder="Repeat your password"
                       required autocomplete="new-password" />
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg" id="registerBtn">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </form>

          <hr class="my-4" />

          <div class="text-center">
            <p class="text-muted mb-0">
              Already have an account?
              <a href="{{ url_for('main.login') }}" class="text-success fw-700">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
