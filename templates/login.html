{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="auth-card">
          <!-- Logo & Title -->
          <div class="text-center mb-4">
            <div class="auth-logo">🌿</div>
            <h2 class="fw-800 text-success">Welcome Back</h2>
            <p class="text-muted">Sign in to your Agri Smart account</p>
          </div>

          <form action="{{ url_for('main.login') }}" method="POST" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label fw-600">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-envelope text-success"></i>
                </span>
                <input type="email" class="form-control border-start-0" id="email" name="email"
                       placeholder="your@email.com" required autocomplete="email" />
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-600">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-pale-green border-end-0">
                  <i class="bi bi-lock text-success"></i>
                </span>
                <input type="password" class="form-control border-start-0" id="password" name="password"
                       placeholder="Enter your password" required autocomplete="current-password" />
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" name="remember" />
                <label class="form-check-label text-muted" for="remember">Remember me</label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <hr class="my-4" />

          <div class="text-center">
            <p class="text-muted mb-0">
              Don't have an account?
              <a href="{{ url_for('main.register') }}" class="text-success fw-700">
                Create Account
              </a>
            </p>
          </div>

      
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}S
